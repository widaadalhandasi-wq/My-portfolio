<div class="p-3 border rounded bg-light mt-3">
    <h6 class="text-muted border-bottom pb-2">Child Area</h6>

    <p class="small">
        Data from parent:
        <span class="text-primary fw-bold">{{ data }}</span>
    </p>

    <div class="mb-3">
        <label for="childInput" class="form-label small fw-semibold">Type to update parent:</label>
        <div class="input-group">
            <input type="text" id="childInput" class="form-control" placeholder="Type something..."
                (input)="sendDataToParent($event)">
        </div>
    </div>
</div>
