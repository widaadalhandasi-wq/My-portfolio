<!-- navbar  -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MyPortfolio</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link " [routerLinkActiveOptions]="{exact: true}" routerLink="/" routerLinkActive="active">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/profile" routerLinkActive="active">Profile</a>
        </li>    
      </ul>
    </div>
  </div>
</nav>

<!-- Header / Hero Section -->
<header class="bg-light py-5 text-center">
  <div class="container">
    <h1 class="display-4 text-primary">Welcome to My Portfolio</h1>
    
    <!-- Interpolation -->
    <h3 class="mt-3">Hello {{ Studentname }}</h3>

    <!-- Profile Image -->
    <img [src]="profileImage" alt="Profile Image" class="profile-img my-3">

    <!-- Buttons -->
    <div class="mt-3">
      <!-- Property Binding -->
      <button class="btn btn-primary me-2" [disabled]="isDisabled">Click me</button>

      <!-- Event Binding -->
      <button class="btn btn-success" (click)="onButtonClick()">Click Me</button>
    </div>

    <!-- Message -->
    <p class="mt-3">{{ message }}</p>
  </div>
</header>
