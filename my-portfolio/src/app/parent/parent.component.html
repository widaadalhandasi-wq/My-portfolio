<div class="parent">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-primary">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Parent Component</h5>
                    </div>
                    <div class="card-body">
                        <p class="mb-3">
                            <strong>Received from Child:</strong>
                            <span class="badge bg-success ms-2">{{ receivedData || '...' }}</span>
                        </p>

                        <app-child [data]="message" (send)="onReceive($event)">
                        </app-child>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
